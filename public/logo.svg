<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Tezlik chiziqlari (chap) -->
  <line x1="4" y1="52" x2="22" y2="52" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="8" y1="62" x2="20" y2="62" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="12" y1="72" x2="22" y2="72" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Sumka asosi (yashil gradient) -->
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <!-- Sumka tanasi -->
  <rect x="24" y="42" width="72" height="62" rx="14" fill="url(#bagGrad)"/>

  <!-- Sumka tutqichi -->
  <path d="M44 42 C44 28 76 28 76 42" stroke="#15803D" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Odam figurasi (katta, markazda) -->
  <!-- Bosh -->
  <circle cx="55" cy="62" r="9" fill="url(#personGrad)"/>
  <!-- Tana -->
  <path d="M42 95 C42 78 68 78 68 95" fill="url(#personGrad)"/>

  <!-- Narx belgisi (tag) - sariq, o'ng tomonda -->
  <g transform="rotate(-15, 88, 58)">
    <rect x="76" y="46" width="24" height="18" rx="5" fill="#F59E0B"/>
    <circle cx="80" cy="50" r="2.5" fill="white"/>
    <line x1="83" y1="56" x2="96" y2="56" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="83" y1="60" x2="93" y2="60" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
