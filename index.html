<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16A34A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OsonTop" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- SEO -->
    <meta name="description" content="OsonTop — O'zbekistondagi barcha bizneslar platformasi. Mahsulot, xizmat yoki biznes toping." />
    <meta name="keywords" content="OsonTop, biznes, xizmat, mahsulot, O'zbekiston, qidiruv" />
    <meta property="og:title" content="OsonTop" />
    <meta property="og:description" content="O'zbekistondagi barcha bizneslar platformasi" />
    <meta property="og:type" content="website" />

    <title>OsonTop</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>.leaflet-container { border-radius: 20px; }</style>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #101010;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #root {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100vh;
      }
      /* iOS safe area */
      @supports (padding: env(safe-area-inset-bottom)) {
        body { padding-bottom: env(safe-area-inset-bottom); }
      }
      /* Scrollbar */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(() => {
            console.log('OsonTop SW registered');
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
